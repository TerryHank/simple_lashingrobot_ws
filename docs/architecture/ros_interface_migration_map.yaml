# Canonical ROS interface migration map.
# This file is the source table for the 2026-04-29 naming cleanup.
# Status values:
#   planned: canonical name is approved but not implemented yet
#   alias: canonical and legacy names both exist during migration
#   migrated: callers use canonical name
#   retired: legacy name has been removed

version: 2026-04-29
status: planned

rules:
  topic: "continuous stream, state, progress, image, marker"
  service: "single request with immediate success/failure"
  action: "long-running task with feedback/result"
  forbidden_new_legacy_prefixes:
    - /pointAI
    - /web/pointAI
    - /web/moduan
  forbidden_new_legacy_names:
    - /coordinate_point
    - /moduan_work

standard_keep:
  topics:
    - /tf
    - /tf_static
    - /diagnostics
    - /rosout
    - /rosout_agg

