#!/usr/bin/env python
PACKAGE = "scepter_param"

from dynamic_reconfigure.parameter_generator_catkin import *
 
gen = ParameterGenerator()

# 工作模式枚举
ActiveMode = gen.const("ActiveMode", int_t, 0, "ActiveMode")
HardwareTriggerMode = gen.const("HardwareTriggerMode", int_t, 1, "HardwareTriggerMode") 
SoftwareTriggerMode = gen.const("SoftwareTriggerMode", int_t, 2, "SoftwareTriggerMode")
WorkMode = gen.enum([ActiveMode, HardwareTriggerMode,SoftwareTriggerMode],"WorkMode")

# 彩色分辨率枚举
ColorResloution0 = gen.const("1600_1200", int_t, 0, "1600_1200")
ColorResloution1 = gen.const("800_600", int_t, 1, "800_600")
ColorResloution2 = gen.const("640_480", int_t, 2, "640_480") 
ColorResloution = gen.enum([ColorResloution0, ColorResloution1,ColorResloution2],"ColorResloution")

# HDR/WDR模式枚举
NormalModel = gen.const("NormalModel", int_t, 0, "NormalModel")
HDRMode = gen.const("HDRMode", int_t, 1, "HDRMode")
WDRMode = gen.const("WDRMode", int_t, 2, "WDRMode")
XDRMode = gen.enum([NormalModel, HDRMode, WDRMode],"XDRMode")

group_tof = gen.add_group("Camera ToF", type="hide", state=True)
# 帧率: 默认10fps, 范围1-30fps
group_tof.add("FrameRate",int_t,0,"FrameRate",5,1,15)
# IR增益: 默认50, 范围0-255
group_tof.add("IRGMMGain",int_t,0,"IRGMMGain",50,0,100)
# 彩色分辨率: 默认640x480(2), 范围0-2
group_tof.add("ColorResloution", int_t, 0, "ColorResloution", 2, 0, 2,edit_method=ColorResloution)
# HDR/WDR模式: 默认HDR模式(1), 范围0-2
group_tof.add("XDRMode", int_t, 0, "XDRMode", 1, 0, 2,edit_method=XDRMode)
# TOF手动曝光开关: 默认开启
group_tof.add("ToFManual",bool_t,0,"A Bool Parameter",True)
# TOF曝光时间: 默认919us, 范围60-4000us
group_tof.add("ToFExposureTime",int_t,0,"ToFExposureTime",3000,0,5000)
# 飞行像素滤波开关: 默认开启
group_tof.add("FlyingPixelenable",bool_t,0,"FlyingPixelenable",False)
# 飞行像素滤波阈值: 默认7, 范围0-16
group_tof.add("FlyingPixelvalue",int_t,0,"FlyingPixelvalue",10,0,16)
# 置信度滤波开关: 默认开启
group_tof.add("Confidenceenable",bool_t,0,"Confidenceenable",False)
# 置信度滤波阈值: 默认20, 范围0-100
group_tof.add("Confidencevalue",int_t,0,"Confidencevalue",4,0,100)
# 时间滤波开关: 默认开启
group_tof.add("TimeFilterenable",bool_t,0,"TimeFilterenable",True)
# 时间滤波阈值: 默认3, 范围0-3
group_tof.add("TimeFiltervalue",int_t,0,"TimeFiltervalue",3,0,3)
# 红外GMM校正开关: 默认关闭
group_tof.add("IRGMMCorrectionenable",bool_t,0,"IRGMMCorrectionenable",False)
# 红外GMM校正阈值: 默认10, 范围0-100
group_tof.add("IRGMMCorrectionvalue",int_t,0,"IRGMMCorrectionvalue",79,0,100)
# 空间滤波开关: 默认关闭
group_tof.add("SpatialFilterEnabled",bool_t,0,"SpatialFilterEnabled",False )
# 填充孔洞滤波开关: 默认关闭
group_tof.add("FillHoleFilterEnabled",bool_t,0,"FillHoleFilterEnabled",False)

# 彩色手动曝光开关: 默认关闭
group_tof.add("ColorManual",bool_t,0,"ColorManual",False)
# 彩色曝光时间: 默认1000us, 范围100-30000us
group_tof.add("ColorExposureTime",int_t,0,"ColorExposureTime",1000,100,30000)
# 工作模式: 默认主动模式(0), 范围0-2
group_tof.add("WorkMode", int_t, 0, "WorkMode", 0, 0, 2,edit_method=WorkMode)
# 软触发开关: 默认关闭
group_tof.add("SoftwareTrigger",bool_t,0,"SoftwareTrigger",False)
# 深度点云开关: 默认关闭
group_tof.add("DepthCloudPoint",bool_t,0,"DepthCloudPoint",True)
# 深度对齐彩色点云开关: 默认关闭
group_tof.add("Depth2ColorCloudPoint",bool_t,0,"Depth2ColorCloudPoint",False)

exit(gen.generate(PACKAGE,"scepter_manager","Sceptertof_roscpp"))   
